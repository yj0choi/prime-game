<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>소수 만들기 (Make a Prime)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="glass">
        <header>
            <div class="nav-header">
                <a href="../../index.html" class="back-link">← 메인으로</a>
            </div>
            <h1>PRIME <span class="accent">MAKER</span></h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">ROUND</span>
                    <span id="round-value" class="value">1 / 10</span>
                </div>
                <div class="stat-item">
                    <span class="label">SCORE</span>
                    <span id="score-value" class="value">0</span>
                </div>
                <div id="timer-area" class="stat-item">
                    <span class="label">TIME</span>
                    <span id="timer-value" class="value">10</span>
                </div>
                <div class="stat-item header-controls">
                    <button id="main-restart-btn" class="mini-btn">게임 재시작</button>
                    <button id="rank-view-btn" class="mini-btn">랭킹</button>
                </div>
            </div>
        </header>

        <main>
            <section id="selected-area" class="card-area">
                <div id="selected-cards" class="cards-container">
                    <!-- 선택된 카드들이 여기에 나타납니다 -->
                </div>
                <div class="placeholder-text" id="placeholder">숫자를 선택하세요 (최소 2자리)</div>
            </section>

            <section id="controls">
                <button id="submit-btn" class="primary-btn" disabled>제출 (Check)</button>
                <button id="reset-btn" class="secondary-btn">다시 선택</button>
                <button id="no-prime-btn" class="secondary-btn">소수 없음</button>
            </section>

            <section id="pool-area" class="card-area">
                <div id="card-pool" class="cards-container">
                    <!-- 랜덤 카드가 여기에 생성됩니다 -->
                </div>
            </section>
        </main>

        <!-- 정답/오답 피드백 오버레이 (19단 Master와 유사한 스타일) -->
        <div id="message-overlay" class="overlay hidden">
            <div class="message-content">
                <h2 id="status-title">통과!</h2>
                <p id="status-desc" style="margin-top: 1rem;"></p>
                <button id="next-btn" class="primary-btn hidden">다음 라운드</button>
            </div>
        </div>

        <!-- 랭킹 등록 및 게임 종료 오버레이 (팝업 스타일) -->
        <div id="rank-entry-overlay" class="overlay hidden">
            <div class="message-content fade-in">
                <h2 style="font-family: 'Orbitron', sans-serif; margin-bottom: 1rem;">GAME OVER</h2>
                <div class="score-display">최종 점수: <span id="final-score" class="accent" style="font-size: 2rem; display: block; margin: 1rem 0;">0</span></div>
                
                <div id="new-record-input" class="hidden">
                    <p style="margin-bottom: 1rem; color: var(--success);">TOP 5 기여를 기록했습니다!</p>
                    <input type="text" id="player-name" placeholder="이름을 입력하세요" maxlength="10" 
                           style="width: 100%; padding: 0.8rem; margin-bottom: 1.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; color: white; text-align: center;">
                    <button id="save-rank-btn" class="primary-btn" style="width: 100%; margin-bottom: 1rem;">기록 저장</button>
                </div>
                
                <button id="restart-btn" class="secondary-btn" style="width: 100%;">다시 시작하기</button>
            </div>
        </div>

        <!-- 랭킹 보드 오버레이 (팝업 스타일) -->
        <div id="leaderboard-overlay" class="overlay hidden">
            <div class="message-content fade-in leaderboard">
                <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; margin-bottom: 1.5rem;">TOP 5 RANKING</h2>
                <ul id="rank-list" class="ranking-list">
                    <!-- 랭킹 목록이 여기에 표시됩니다 -->
                </ul>
                <div class="overlay-controls" style="margin-top: 1.5rem;">
                    <button id="close-rank-btn" class="secondary-btn" style="width: 100%;">닫기</button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Prime Maker. High IQ Challenge.</p>
        </footer>
    </div>
    <script src="../../assets/js/ranking.js"></script>
    <script src="game.js"></script>
</body>
</html>
