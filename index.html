<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Math Game Portal</title>
    <!-- 공통 스타일은 추후 assets/css로 분리 예정이며 우선 루트 style.css 활용 -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .portal-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(88, 166, 255, 0.15);
        }
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .game-card:hover::before {
            left: 100%;
        }
        .game-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            color: var(--primary);
        }
        .game-card p {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .game-card .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.3));
        }
        .badge {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(188, 140, 255, 0.3);
        }
        .coming-soon {
            opacity: 0.8;
            filter: grayscale(0.5);
        }
        .coming-soon .badge {
            background: #4a5568;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>MATH <span class="accent">GAME</span></h1>
            <p style="color: var(--text-sub); font-size: 1.1rem;">재미있게 배우는 수학 퍼즐 플랫폼</p>
        </header>

        <main class="portal-container">
            <a href="games/prime-game/index.html" class="game-card">
                <div class="icon">🔢</div>
                <h3>PRIME MAKER</h3>
                <p>무작위 카드를 조합하여<br>가장 큰 소수를 만들어 보세요!</p>
                <div class="badge">PLAY NOW</div>
            </a>

            <a href="games/19xmaster/index.html" class="game-card">
                <div class="icon">❌</div>
                <h3>19단 MASTER</h3>
                <p>암산의 한계에 도전!<br>19단 곱셈을 완벽하게 마스터하세요.</p>
                <div class="badge">PLAY NOW</div>
            </a>
        </main>

        <footer>
            <p>&copy; 2026 Math Game Platform. Challenge Your Brain.</p>
        </footer>
    </div>
</body>
</html>
